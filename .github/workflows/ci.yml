---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Lint
        run: |
          uv run --frozen --extra dev ruff check .
          uv run --frozen --extra dev ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Type check
        run: uv run --frozen --extra typecheck mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Test
        run: uv run --frozen --extra test --python ${{ matrix.python-version }} pytest

  release:
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # PyPI trusted publishing (OIDC)
      contents: write  # version commit, tag, and GitHub release
    steps:
      # semantic-release pushes the version commit and tag back to main. The
      # default GITHUB_TOKEN cannot push to a protected branch, so if main is
      # protected, add a RELEASE_TOKEN secret (a GitHub App or PAT allowed to
      # bypass protection); it is used automatically when present.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Semantic release (version + tag + GitHub release)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: uv run --frozen --extra release semantic-release version

      # build_command populates dist/ only when a new version is cut, so a
      # non-empty dist/ is the signal that there is something to publish.
      - name: Check whether a release was created
        id: check_release
        run: |
          if [ -d dist ] && [ -n "$(ls -A dist)" ]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            ls -la dist/
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "No new release — nothing to publish."
          fi

      - name: Publish to PyPI
        if: steps.check_release.outputs.release_created == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
