version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep Python dependencies (uv.lock) current.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
